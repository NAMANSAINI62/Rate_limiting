# =============================================================================
# alembic.ini
# =============================================================================
# What is this file?
#   Alembic configuration file. Alembic is a database migration tool.
#
# What is a database migration?
#   When you change your database schema (add a column, create a table,
#   rename a field), you need a way to:
#     1. Track what the schema looked like at each point in time
#     2. Apply changes in order (version 001 → 002 → 003)
#     3. Roll back changes if something goes wrong (003 → 002)
#     4. Share schema changes with your team without losing data
#
#   A migration is a Python file describing the "up" (apply) and
#   "down" (rollback) operations for one schema change.
#
# How to use Alembic:
#   Create new migration: alembic revision --autogenerate -m "add users table"
#   Apply migrations:     alembic upgrade head
#   Roll back one step:   alembic downgrade -1
#   View history:         alembic history
#   View current:         alembic current
# =============================================================================

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template for migration file names
# %(rev)s = revision ID, %(slug)s = description, %(year)d etc = timestamp
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamp in filenames
# timezone = UTC

# Max length of slug (description part of filename)
truncate_slug_length = 40

# DO NOT set sqlalchemy.url here — we set it dynamically in alembic/env.py
# from our .env file. This way secrets stay out of alembic.ini.
# sqlalchemy.url = (set in alembic/env.py)

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
